name: Notification API CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'ms-notification-api/**' # SÓ roda se houver mudanças nesta pasta
  pull_request:
    branches: [ "main" ]
    paths:
      - 'ms-notification-api/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código do repositório
        uses: actions/checkout@v4

      - name: Configurar o Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar e Rodar Testes com Maven
        run: mvn clean test
        working-directory: ./ms-notification-api # Entra na pasta do notification antes de rodar o comando